; ============================================================================
; AngaWatch Greenhouse — ESP32 LoRa sensor node (PlatformIO)
; ----------------------------------------------------------------------------
; One node lives inside a greenhouse, wakes on the RTC timer, reads the sensor
; bus, runs the *instant* microclimate threshold rules locally (so a farmer
; still gets an offline buzzer/relay alert when LoRa/cloud is down), packs a
; telemetry JSON document matching app/schemas/telemetry.py, transmits it over
; an SX1276/RFM95 LoRa radio to the field gateway, and goes back to deep sleep.
;
; This project is authored for clarity — it is NOT compiled in CI. Pin maps and
; lib versions are sane defaults for a Heltec/TTGO-style ESP32 + SX1276 board;
; recalibrate against your actual hardware before flashing (see README.md).
; ============================================================================

[platformio]
default_envs = esp32dev

; ----------------------------------------------------------------------------
; Shared options inherited by every [env:*] below.
; ----------------------------------------------------------------------------
[common]
framework = arduino
monitor_speed = 115200
upload_speed = 921600

; All third-party libraries are pinned to a known-good major to keep the build
; reproducible. Bump deliberately, not on a whim.
lib_deps =
    ; --- LoRa radio (SX1276 / RFM95) -------------------------------------
    ; Lightweight, well-documented driver. Swap for RadioHead (RH_RF95) if you
    ; need LoRaWAN/addressed reliable datagrams instead of raw LoRa packets.
    sandeepmistry/LoRa @ ^0.8.0
    ; --- JSON telemetry encoding -----------------------------------------
    bblanchon/ArduinoJson @ ^7.0.4
    ; --- SHT3x / SHT4x air temperature + relative humidity ---------------
    sensirion/Sensirion I2C SHT4x @ ^1.0.0
    ; --- DS18B20 soil temperature probe (OneWire) ------------------------
    paulstoffregen/OneWire @ ^2.3.8
    milesburton/DallasTemperature @ ^3.11.0
    ; --- RS485 / Modbus-RTU NPK soil sensor ------------------------------
    ; 4eUbtHcQyZ/ModbusMaster reads the 7-in-1 / NPK probes over RS485.
    4-20ma/ModbusMaster @ ^2.0.1
    ; NOTE: RS485 also needs a half-duplex transceiver (MAX485/SP3485). The
    ; DE/RE direction pin is defined in include/config.h (PIN_RS485_DE).

; Deep-sleep + radio build flags. Keep the RTC slow clock alive across sleep so
; cycle counters (pheromone trap, water totals) survive a wake/sleep cycle.
build_flags =
    -D CORE_DEBUG_LEVEL=2
    -D CONFIG_ARDUINO_LOOP_STACK_SIZE=8192
    ; Radio region: EU868 ISM band used here (matches LORA_FREQUENCY 868E6 in
    ; config.h). For Kenya, 868 MHz LoRa is commonly deployed; confirm against
    ; the Communications Authority of Kenya ISM allocation before field use.
    -D LORA_BAND_868

; ----------------------------------------------------------------------------
; Primary build target: generic ESP32 dev module.
; ----------------------------------------------------------------------------
[env:esp32dev]
platform = espressif32 @ ^6.5.0
board = esp32dev
framework = ${common.framework}
monitor_speed = ${common.monitor_speed}
upload_speed = ${common.upload_speed}
lib_deps = ${common.lib_deps}
build_flags = ${common.build_flags}

; ----------------------------------------------------------------------------
; Optional OTA target. Point upload_port at the node's IP once it joins WiFi.
; Firmware OTA hooks are stubbed in src/main.cpp (see OTA-READY comments).
; Uncomment and set the address to flash over the air.
; ----------------------------------------------------------------------------
[env:esp32dev_ota]
extends = env:esp32dev
upload_protocol = espota
; upload_port = 192.168.1.50
; upload_flags = --auth=${sysenv.OTA_PASSWORD}
