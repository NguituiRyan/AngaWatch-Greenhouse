# Mosquitto config for local AngaWatch dev.
# Anonymous access is fine for local dev ONLY. In production use TLS + per-org auth.
listener 1883 0.0.0.0
allow_anonymous true

# WebSocket listener (optional, for browser MQTT debugging tools)
listener 9001 0.0.0.0
protocol websockets

persistence true
persistence_location /mosquitto/data/
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information
max_queued_messages 10000
